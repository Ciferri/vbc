<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Very Breizh Cup — Mon pronostic</title>
<script>(function(){var t=localStorage.getItem("vbc_theme")||(matchMedia("(prefers-color-scheme: dark)").matches?"dark":"light");document.documentElement.setAttribute("data-theme",t);})();</script>
<link rel="stylesheet" href="js/style.css">
</head>
<body>

<header class="app-header">
  <div class="header-logo">
    <img src="js/logo.png" alt="Club Canin de Bourgbarré">
    <div class="app-title">Very Breizh <span class="cup">Cup</span><span class="sub">Le Top 3 — Pronostics</span></div>
  </div>
  <span class="role-badge">Joueur</span>
</header>

<div id="closedBanner" class="closed-banner" style="display:none">Paris clôturés — Aucune nouvelle inscription</div>

<main class="page">

  <!-- FORMULAIRE -->
  <div id="playerFormSection">
    <div class="card">
      <div class="card-title">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="5" width="18" height="14" rx="2"/><path d="M3 10h18"/></svg>
        Mon pronostic
      </div>
      <label class="field-label">Prénom</label>
      <input type="text" id="playerPrenom" class="field-input" placeholder="Ex : Marie" autocomplete="given-name">
      <label class="field-label">Nom</label>
      <input type="text" id="playerNom" class="field-input" placeholder="Ex : Dupont" autocomplete="family-name">
      <label class="field-label">Téléphone</label>
      <input type="tel" id="playerTel" class="field-input" placeholder="Ex : 06 12 34 56 78" autocomplete="tel" inputmode="tel">
    </div>

    <div id="betsContainer"></div>

    <button class="btn-outline" id="addBetBtn" onclick="addBetBlock()">
      + Ajouter un autre pari
    </button>

    <div id="playerFormError" class="alert alert-red" style="display:none;margin-top:12px"></div>
    <button class="btn-primary" id="submitBtn" onclick="submitBets()" style="margin-top:10px">Valider mon pari — 2 €</button>
  </div>

  <!-- TICKETS (rendus dynamiquement) -->
  <div id="ticketSection" style="display:none"></div>

  <hr class="section-divider">

  <!-- TENDANCES -->
  <div class="card">
    <div class="card-title">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22 7 13.5 15.5 8.5 10.5 2 17"/><polyline points="16 7 22 7 22 13"/></svg>
      Tendances — Favoris du public
    </div>
    <label class="field-label">Catégorie</label>
    <select id="trendCatFilter" class="field-select" onchange="renderFavoritesTrend()">
      <option value="S">S — Small</option>
      <option value="M">M — Medium</option>
      <option value="I">I — Intermediate</option>
      <option value="L">L — Large</option>
    </select>
    <div class="section-label" style="margin-top:4px">Podium probable</div>
    <div id="favoritesTrendList"><div class="spinner"></div></div>
    <p style="font-size:.72rem;color:var(--muted);margin-top:10px;line-height:1.5">Basé sur tous les pronostics enregistrés. 3 pts pour un 1er, 2 pts pour un 2e, 1 pt pour un 3e. Indice bas = favori du public.</p>
  </div>

</main>

<div id="toast"></div>
<script src="js/supabase.js"></script>
<script src="js/ui.js"></script>
<script>
let finalists = [], betsClosed = false, betCount = 0;

async function init() {
  try {
    const rows = await sbGet('config', 'select=key,value');
    const cfg = Object.fromEntries(rows.map(r => [r.key, r.value]));
    betsClosed = cfg.bets_closed === 'true';
    document.getElementById('closedBanner').style.display = betsClosed ? 'block' : 'none';
    document.getElementById('submitBtn').disabled = betsClosed;
    document.getElementById('addBetBtn').style.display = betsClosed ? 'none' : 'block';
  } catch(e) {}
  try { finalists = await sbGet('finalistes', 'order=cat,chien'); } catch(e) {}
  addBetBlock();
  renderFavoritesTrend();
  realtimeSubscribe('tickets', () => renderFavoritesTrend());
}

// ── BLOCS DE PARIS DYNAMIQUES ──
function addBetBlock() {
  betCount++;
  const idx = betCount;
  const div = document.createElement('div');
  div.className = 'card bet-block';
  div.id = `betBlock${idx}`;
  div.innerHTML = `
    <div class="card-title" style="justify-content:space-between">
      <span style="display:flex;align-items:center;gap:9px">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:16px;height:16px;color:var(--lime)"><path d="M8 21h8M12 21V3M3 7l9-4 9 4v6a9 9 0 01-18 0V7z"/></svg>
        Pari <span class="bet-num">${idx}</span>
      </span>
      <button class="btn-sm-danger bet-remove" onclick="removeBetBlock(${idx})" style="display:none">Retirer</button>
    </div>
    <label class="field-label">Catégorie</label>
    <select id="cat${idx}" class="field-select" onchange="onCategoryChange(${idx})">
      <option value="">— Sélectionner une catégorie —</option>
      <option value="S">S — Small</option>
      <option value="M">M — Medium</option>
      <option value="I">I — Intermediate</option>
      <option value="L">L — Large</option>
    </select>
    <div id="picks${idx}" style="display:none">
      <label class="field-label">1re place</label>
      <select id="pick${idx}_1" class="field-select" onchange="syncSelects(${idx})"><option value="">— Choisir un binôme —</option></select>
      <label class="field-label">2e place</label>
      <select id="pick${idx}_2" class="field-select" onchange="syncSelects(${idx})"><option value="">— Choisir un binôme —</option></select>
      <label class="field-label">3e place</label>
      <select id="pick${idx}_3" class="field-select" onchange="syncSelects(${idx})"><option value="">— Choisir un binôme —</option></select>
    </div>
  `;
  document.getElementById('betsContainer').appendChild(div);
  updateBetUI();
}

function removeBetBlock(idx) {
  const el = document.getElementById(`betBlock${idx}`);
  if (el) el.remove();
  updateBetUI();
}

function getBetBlocks() {
  return Array.from(document.querySelectorAll('.bet-block'));
}

function updateBetUI() {
  const blocks = getBetBlocks();
  blocks.forEach((b, i) => {
    b.querySelector('.bet-num').textContent = i + 1;
    b.querySelector('.bet-remove').style.display = blocks.length > 1 ? 'inline-block' : 'none';
  });
  const n = blocks.length;
  const btn = document.getElementById('submitBtn');
  btn.textContent = n > 1 ? `Valider mes ${n} paris — ${n*2} €` : 'Valider mon pari — 2 €';
}

function onCategoryChange(idx) {
  const cat = document.getElementById(`cat${idx}`).value;
  const list = cat ? finalists.filter(f => f.cat === cat) : [];
  const opts = '<option value="">— Choisir un binôme —</option>' + list.map(f => `<option value="${f.id}">${f.chien} · ${f.conducteur}</option>`).join('');
  [1,2,3].forEach(p => { const s = document.getElementById(`pick${idx}_${p}`); s.innerHTML = opts; s.value = ''; });
  document.getElementById(`picks${idx}`).style.display = cat ? 'block' : 'none';
  syncSelects(idx);
}

function syncSelects(idx) {
  const v = [1,2,3].map(p => document.getElementById(`pick${idx}_${p}`).value);
  [1,2,3].forEach((p, i) => {
    const sel = document.getElementById(`pick${idx}_${p}`);
    const others = v.filter((_, j) => j !== i);
    Array.from(sel.options).forEach(opt => { opt.disabled = !!opt.value && others.includes(opt.value) && opt.value !== sel.value; });
  });
}

// ── SOUMISSION MULTIPLE ──
async function submitBets() {
  if (betsClosed) { showError('Les paris sont clôturés.'); return; }
  const prenom = document.getElementById('playerPrenom').value.trim();
  const nom    = document.getElementById('playerNom').value.trim();
  const tel    = document.getElementById('playerTel').value.trim();
  if (!prenom || !nom || !tel) { showError('Remplis ton Prénom, Nom et Téléphone.'); return; }

  const blocks = getBetBlocks();
  const bets = [];
  for (let i = 0; i < blocks.length; i++) {
    const b = blocks[i];
    const idx = b.id.replace('betBlock','');
    const cat = document.getElementById(`cat${idx}`).value;
    const p1 = document.getElementById(`pick${idx}_1`).value;
    const p2 = document.getElementById(`pick${idx}_2`).value;
    const p3 = document.getElementById(`pick${idx}_3`).value;
    if (!cat) { showError(`Pari ${i+1} : choisis la catégorie.`); return; }
    if (!p1||!p2||!p3) { showError(`Pari ${i+1} : sélectionne les 3 positions.`); return; }
    if (p1===p2||p1===p3||p2===p3) { showError(`Pari ${i+1} : un même binôme ne peut pas occuper deux places.`); return; }
    bets.push({ cat, p1: parseInt(p1), p2: parseInt(p2), p3: parseInt(p3) });
  }

  const btn = document.getElementById('submitBtn');
  btn.disabled = true; btn.textContent = 'Envoi en cours…'; hideError();
  try {
    const created = [];
    for (let i = 0; i < bets.length; i++) {
      const b = bets[i];
      const ticketId = 'VBC-' + Date.now().toString(36).toUpperCase() + (bets.length > 1 ? '-' + (i+1) : '');
      await sbPost('tickets', { id: ticketId, prenom, nom, tel, cat: b.cat, pick1: b.p1, pick2: b.p2, pick3: b.p3, status: 'pending' });
      created.push({ id: ticketId, ...b });
    }
    renderTickets(created, prenom, nom);
    document.getElementById('trendCatFilter').value = bets[0].cat;
    renderFavoritesTrend();
  } catch(e) {
    showError('Erreur lors de l\'envoi. Réessaie.');
    btn.disabled = false; updateBetUI();
  }
}

function renderTickets(created, prenom, nom) {
  const section = document.getElementById('ticketSection');
  const total = created.length * 2;
  section.innerHTML = created.map((t, i) => {
    const catHtml = `<div style="margin-bottom:10px"><span class="podium-cat-tag">Catégorie ${t.cat} — ${SIZE_LABELS[t.cat]}</span></div>`;
    return `
    <div class="ticket" style="margin-bottom:14px;animation-delay:${i*0.12}s">
      <div class="ticket-header">
        <span>Very Breizh Cup${created.length>1?` — Pari ${i+1}/${created.length}`:''}</span>
        <span class="badge badge-pending">En attente</span>
      </div>
      <div class="ticket-body">
        <div class="ticket-num">${t.id}</div>
        <div class="ticket-player">${prenom} ${nom.toUpperCase()}</div>
        <div class="ticket-dashed"></div>
        ${catHtml}${renderPodiumLines([t.p1,t.p2,t.p3], finalists)}
        <div class="qr-wrapper">
          <div class="ticket-dashed"></div>
          <canvas id="qr_${i}" width="130" height="130"></canvas>
          <div class="qr-label">Scanner au stand de paiement</div>
        </div>
      </div>
    </div>`;
  }).join('') + `
    <div class="alert alert-red" style="margin-top:4px">Rendez-vous au stand pour valider votre paiement de <strong>${total} €</strong></div>
    <button class="btn-outline" onclick="location.reload()">Nouveau pari</button>`;

  document.getElementById('playerFormSection').style.display = 'none';
  section.style.display = 'block';
  created.forEach((t, i) => drawQR(`qr_${i}`, t.id));
}

// ── TENDANCES ──
async function renderFavoritesTrend() {
  const cat = document.getElementById('trendCatFilter').value || 'S';
  const el = document.getElementById('favoritesTrendList');
  el.innerHTML = '<div class="spinner"></div>';
  try {
    const allTickets = await sbGet('tickets', `cat=eq.${cat}&select=pick1,pick2,pick3`);
    const dogs = finalists.filter(f => f.cat === cat);
    const pts = {}; dogs.forEach(f => { pts[f.id]=0; });
    let total = 0;
    allTickets.forEach(t => { [t.pick1,t.pick2,t.pick3].forEach((id,i) => { if(id&&pts.hasOwnProperty(id)){pts[id]+=PODIUM_W[i];total+=PODIUM_W[i];} }); });
    if (!dogs.length || total === 0) { el.innerHTML = '<p style="color:var(--muted);font-size:.88rem">Pas encore de pronostics pour cette catégorie.</p>'; return; }
    const maxPts = Math.max(...Object.values(pts), 1);
    const ranked = dogs.map(f => ({...f, pts:pts[f.id], indice:pts[f.id]>0?total/pts[f.id]:Infinity})).sort((a,b)=>a.indice-b.indice).slice(0,3);
    el.innerHTML = ranked.map((f,i) => `<div class="trend-item ${i===0?'rank-1':''}">
      <div class="trend-rank">${i+1}</div>
      <div class="trend-info">
        <div class="trend-name">${f.chien}</div>
        <div class="trend-handler">${f.conducteur} &middot; ${f.pts} pt${f.pts>1?'s':''}</div>
        <div class="trend-bar-wrap"><div class="trend-bar-fill" style="width:${Math.round(f.pts/maxPts*100)}%"></div></div>
      </div>
      <div class="trend-index">${f.pts>0?f.indice.toFixed(2):'—'}</div>
    </div>`).join('');
  } catch(e) { el.innerHTML = '<div class="alert alert-red">Erreur chargement tendances.</div>'; }
}

function showError(msg) { const e=document.getElementById('playerFormError'); e.style.display='block'; e.textContent=msg; e.scrollIntoView({behavior:'smooth',block:'center'}); }
function hideError() { document.getElementById('playerFormError').style.display='none'; }
init();
</script>
</body>
</html>
