<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Very Breizh Cup — Résultats Live</title>
<link rel="stylesheet" href="js/style.css">
<style>
  body { background: var(--black); }
  .live-dot { width:10px; height:10px; background:var(--lime); border-radius:50%; display:inline-block; animation:pulse 1.4s ease-in-out infinite; margin-right:6px; }
  @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.4;transform:scale(.8)} }
  .podium-display { display:flex; gap:8px; align-items:flex-end; justify-content:center; margin:16px 0; }
  .podium-col { display:flex; flex-direction:column; align-items:center; gap:6px; flex:1; }
  .podium-block { width:100%; border-radius:8px 8px 0 0; display:flex; align-items:center; justify-content:center; font-family:'Barlow Condensed',sans-serif; font-weight:900; font-size:1.4rem; }
  .podium-block.p1 { height:80px; background:var(--lime); color:var(--black); }
  .podium-block.p2 { height:60px; background:#888; color:#fff; }
  .podium-block.p3 { height:44px; background:#7a4f2b; color:#fff; }
  .podium-label { font-family:'Barlow Condensed',sans-serif; font-weight:700; font-size:.82rem; text-align:center; color:var(--light); line-height:1.2; }
  .podium-sub { font-size:.72rem; color:var(--muted); }
  .cat-tab { font-family:'Barlow Condensed',sans-serif; font-weight:700; font-size:.85rem; text-transform:uppercase; letter-spacing:.08em; padding:7px 14px; border:1.5px solid var(--border); border-radius:6px; cursor:pointer; background:transparent; color:var(--muted); transition:all .2s; }
  .cat-tab.active { background:var(--lime); color:var(--black); border-color:var(--lime); }
  .cat-tabs { display:flex; gap:8px; margin-bottom:14px; flex-wrap:wrap; }
</style>
</head>
<body>
<div class="app-header">
  <div class="app-title">Very Breizh <span class="cup">Cup</span><span class="sub"><span class="live-dot"></span>Résultats en direct</span></div>
  <span class="role-badge">Public</span>
</div>
<div class="page">

  <div class="cat-tabs">
    <button class="cat-tab active" onclick="switchCat('S',this)">S</button>
    <button class="cat-tab" onclick="switchCat('M',this)">M</button>
    <button class="cat-tab" onclick="switchCat('I',this)">I</button>
    <button class="cat-tab" onclick="switchCat('L',this)">L</button>
  </div>

  <div class="card">
    <div class="card-title" id="catTitle">🏆 Catégorie S — Small</div>
    <div id="podiumVisual"></div>
    <div id="classementComplet"></div>
  </div>

  <div class="card">
    <div class="card-title">🔥 Favoris du public — <span id="trendCatLabel">S</span></div>
    <div id="trendDisplay"><div class="spinner"></div></div>
    <div style="font-size:.74rem;color:var(--muted);margin-top:8px;line-height:1.4">Basé sur l'ensemble des pronostics enregistrés.</div>
  </div>

</div>
<div id="toast"></div>
<script src="js/supabase.js"></script>
<script>
let finalists = [], currentCat = 'S';

async function init() {
  try { finalists = await sbGet('finalistes', 'order=cat,chien'); } catch(e) {}
  renderAll();
  realtimeSubscribe('chronos', () => renderAll());
  realtimeSubscribe('tickets', () => renderTrend());
  setInterval(renderAll, 30000);
}

function switchCat(cat, btn) {
  currentCat = cat;
  document.querySelectorAll('.cat-tab').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('catTitle').textContent = `🏆 Catégorie ${cat} — ${SIZE_LABELS[cat]}`;
  document.getElementById('trendCatLabel').textContent = cat;
  renderAll();
}

async function renderAll() { await Promise.all([renderClassement(), renderTrend()]); }

async function renderClassement() {
  const podEl = document.getElementById('podiumVisual');
  const listEl = document.getElementById('classementComplet');
  try {
    const chronos = await sbGet('chronos', `cat=eq.${currentCat}&select=*`);
    const dogs = finalists.filter(f => f.cat === currentCat);
    if (!chronos.length) {
      podEl.innerHTML = '<div style="color:var(--muted);text-align:center;padding:20px;font-size:.9rem">En attente des résultats…</div>';
      listEl.innerHTML = ''; return;
    }
    const rows = chronos.map(c => {
      const f = dogs.find(d => d.id === c.finaliste_id);
      return { ...c, f, score: c.disqualifie ? Infinity : (c.temps_sec||0)+(c.penalites||0) };
    }).sort((a,b) => a.score - b.score);

    const valid = rows.filter(r => !r.disqualifie);
    if (valid.length >= 1) {
      const order = [valid[1], valid[0], valid[2]].filter(Boolean);
      const classes = ['p2','p1','p3'];
      const labels = ['🥈','🥇','🥉'];
      podEl.innerHTML = `<div class="podium-display">${order.map((r,i) => `
        <div class="podium-col">
          <div class="podium-label">${r.f?.chien||'?'}<br><span class="podium-sub">${r.f?.conducteur||''}</span></div>
          <div class="podium-block ${classes[i]}">${labels[i]}</div>
        </div>`).join('')}</div>`;
    } else { podEl.innerHTML = ''; }

    listEl.innerHTML = rows.map((r,i) => `
      <div class="chrono-row">
        <div class="chrono-pos ${r.disqualifie?'':''}">` + (r.disqualifie?'DQ':i+1) + `</div>
        <div class="chrono-info">
          <div class="chrono-name ${r.disqualifie?'chrono-dq':''}">${r.f?.chien||'?'} · ${r.f?.conducteur||'?'}</div>
          <div class="chrono-detail">${r.disqualifie?'Disqualifié':`${r.penalites||0} pt(s) de pénalité`}</div>
        </div>
        <div class="chrono-time ${r.disqualifie?'chrono-dq':''}">${r.disqualifie?'—':r.temps_sec?.toFixed(2)+'s'}</div>
      </div>`).join('');
  } catch(e) {}
}

async function renderTrend() {
  const el = document.getElementById('trendDisplay');
  try {
    const allTickets = await sbGet('tickets', `cat=eq.${currentCat}&select=pick1,pick2,pick3`);
    const dogs = finalists.filter(f => f.cat === currentCat);
    const pts = {}; dogs.forEach(f => { pts[f.id]=0; });
    let total = 0;
    allTickets.forEach(t => { [t.pick1,t.pick2,t.pick3].forEach((id,i) => { if(id&&pts.hasOwnProperty(id)){pts[id]+=PODIUM_W[i];total+=PODIUM_W[i];} }); });
    if (!dogs.length || total === 0) { el.innerHTML = '<div style="color:var(--muted);font-size:.9rem">Pas encore de pronostics.</div>'; return; }
    const maxPts = Math.max(...Object.values(pts), 1);
    const ranked = dogs.map(f => ({...f, pts:pts[f.id], indice:pts[f.id]>0?total/pts[f.id]:Infinity})).sort((a,b)=>a.indice-b.indice).slice(0,3);
    el.innerHTML = ranked.map((f,i) => `<div class="trend-item ${i===0?'rank-1':''}">
      <div class="trend-rank">${MEDALS[i]}</div>
      <div class="trend-info">
        <div class="trend-name">${f.chien}</div>
        <div class="trend-handler">${f.conducteur} · ${f.pts} pt${f.pts>1?'s':''}</div>
        <div class="trend-bar-wrap"><div class="trend-bar-fill" style="width:${Math.round(f.pts/maxPts*100)}%"></div></div>
      </div>
      <div class="trend-index">${f.pts>0?f.indice.toFixed(2):'—'}</div>
    </div>`).join('');
  } catch(e) {}
}

init();
</script>
</body>
</html>
