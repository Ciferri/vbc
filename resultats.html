<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Very Breizh Cup — Cotes des favoris</title>
<script>(function(){var t=localStorage.getItem("vbc_theme")||(matchMedia("(prefers-color-scheme: dark)").matches?"dark":"light");document.documentElement.setAttribute("data-theme",t);})();</script>
<link rel="stylesheet" href="js/style.css">
</head>
<body>
<header class="app-header">
  <div class="header-logo">
    <img src="js/logo.jpg" alt="Club Canin de Bourgbarré">
    <div class="app-title">Very Breizh <span class="cup">Cup</span><span class="sub">Cotes des favoris</span></div>
  </div>
</header>
<main class="page">

  <div style="display:flex;align-items:center;gap:7px;margin-bottom:12px;font-family:var(--font-display);font-weight:700;font-size:.72rem;text-transform:uppercase;letter-spacing:.15em;color:var(--lime-text)">
    <span class="live-dot"></span>Mise à jour en direct
  </div>

  <div class="cat-tabs">
    <button class="cat-tab active" onclick="switchCat('S',this)">S</button>
    <button class="cat-tab" onclick="switchCat('M',this)">M</button>
    <button class="cat-tab" onclick="switchCat('I',this)">I</button>
    <button class="cat-tab" onclick="switchCat('L',this)">L</button>
  </div>

  <div class="card">
    <div class="card-title" id="catTitle">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22 7 13.5 15.5 8.5 10.5 2 17"/><polyline points="16 7 22 7 22 13"/></svg>
      Catégorie S — Small
    </div>
    <div id="podiumVisual"></div>
    <div id="cotesList"><div class="spinner"></div></div>
    <p style="font-size:.72rem;color:var(--muted);margin-top:12px;line-height:1.5">
      Cote calculée sur l'ensemble des paris enregistrés : 3 points pour une 1re place, 2 pour une 2e, 1 pour une 3e.
      Plus la cote est basse, plus le binôme est favori du public.
    </p>
  </div>

</main>
<div id="toast"></div>
<script src="js/supabase.js"></script>
<script src="js/ui.js"></script>
<script>
let finalists = [], currentCat = 'S';

async function init() {
  try { finalists = await sbGet('finalistes', 'order=cat,chien'); } catch(e) {}
  renderCotes();
  realtimeSubscribe('tickets', () => renderCotes());
  setInterval(() => { if (!document.hidden) renderCotes(); }, 60000);
  document.addEventListener('visibilitychange', () => { if (!document.hidden) renderCotes(); });
}

function switchCat(cat, btn) {
  currentCat = cat;
  document.querySelectorAll('.cat-tab').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('catTitle').innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22 7 13.5 15.5 8.5 10.5 2 17"/><polyline points="16 7 22 7 22 13"/></svg> Catégorie ${cat} — ${SIZE_LABELS[cat]}`;
  renderCotes();
}

async function renderCotes() {
  const podEl  = document.getElementById('podiumVisual');
  const listEl = document.getElementById('cotesList');
  try {
    const tickets = await sbGet('tickets', `cat=eq.${currentCat}&select=pick1,pick2,pick3`);
    const dogs = finalists.filter(f => f.cat === currentCat);

    if (!dogs.length) {
      podEl.innerHTML = '';
      listEl.innerHTML = '<p style="color:var(--muted);font-size:.9rem">Aucun finaliste dans cette catégorie.</p>';
      return;
    }

    const pts = {}; dogs.forEach(f => { pts[f.id] = 0; });
    let total = 0;
    tickets.forEach(t => {
      [t.pick1, t.pick2, t.pick3].forEach((id, i) => {
        if (id && pts.hasOwnProperty(id)) { pts[id] += PODIUM_W[i]; total += PODIUM_W[i]; }
      });
    });

    if (total === 0) {
      podEl.innerHTML = '';
      listEl.innerHTML = '<p style="color:var(--muted);font-size:.9rem">Aucun pari enregistré pour cette catégorie.</p>';
      return;
    }

    const maxPts = Math.max(...Object.values(pts), 1);
    const ranked = dogs
      .map(f => ({ ...f, pts: pts[f.id], cote: pts[f.id] > 0 ? total / pts[f.id] : Infinity }))
      .sort((a, b) => a.cote - b.cote || a.chien.localeCompare(b.chien))
      .slice(0, 10);

    // Podium des 3 favoris
    const top3 = ranked.filter(f => f.pts > 0).slice(0, 3);
    if (top3.length >= 3) {
      const display = [top3[1], top3[0], top3[2]];
      const classes = ['p2','p1','p3'];
      const labels  = ['2','1','3'];
      podEl.innerHTML = `<div class="podium-display">${display.map((r,i) => `
        <div class="podium-col">
          <div class="podium-label">${r.chien}<br><span class="podium-sub">cote ${r.cote.toFixed(2)}</span></div>
          <div class="podium-block ${classes[i]}">${labels[i]}</div>
        </div>`).join('')}</div>`;
    } else {
      podEl.innerHTML = '';
    }

    listEl.innerHTML = `<div class="section-label" style="margin:14px 0 8px">Classement des cotes</div>` +
      ranked.map((f, i) => `
      <div class="trend-item ${i===0?'rank-1':''}">
        <div class="trend-rank">${i+1}</div>
        <div class="trend-info">
          <div class="trend-name">${f.chien}</div>
          <div class="trend-handler">${f.conducteur} &middot; ${f.pts} pt${f.pts>1?'s':''}</div>
          <div class="trend-bar-wrap"><div class="trend-bar-fill" style="width:${Math.round(f.pts/maxPts*100)}%"></div></div>
        </div>
        <div class="trend-index">${f.pts>0 ? f.cote.toFixed(2) : '—'}</div>
      </div>`).join('');
  } catch(e) {
    listEl.innerHTML = '<div class="alert alert-red">Erreur de chargement des cotes.</div>';
  }
}
init();
</script>
</body>
</html>
