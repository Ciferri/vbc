<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Very Breizh Cup — Terrain</title>
<script>(function(){var t=localStorage.getItem("vbc_theme")||(matchMedia("(prefers-color-scheme: dark)").matches?"dark":"light");document.documentElement.setAttribute("data-theme",t);})();</script>
<link rel="stylesheet" href="js/style.css">
</head>
<body>
<header class="app-header">
  <div class="header-logo">
    <img src="js/logo.png" alt="Club Canin de Bourgbarré">
    <div class="app-title">Very Breizh <span class="cup">Cup</span><span class="sub">Saisie des chronos</span></div>
  </div>
  <span class="role-badge">Terrain</span>
</header>
<main class="page">

  <div class="card">
    <div class="card-title">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
      Enregistrer un passage
    </div>
    <label class="field-label">Catégorie</label>
    <select id="terrainCat" class="field-select" onchange="loadFinalistsByCat()">
      <option value="">— Sélectionner —</option>
      <option value="S">S — Small</option>
      <option value="M">M — Medium</option>
      <option value="I">I — Intermediate</option>
      <option value="L">L — Large</option>
    </select>
    <label class="field-label">Binôme</label>
    <select id="terrainFinalist" class="field-select">
      <option value="">— Choisir d'abord la catégorie —</option>
    </select>
    <label class="field-label">Temps (secondes)</label>
    <input type="number" id="terrainTemps" class="field-input" placeholder="Ex : 38.42" step="0.01" min="0" inputmode="decimal">
    <label class="field-label">Pénalités (points)</label>
    <input type="number" id="terrainPenalites" class="field-input" placeholder="0" min="0" value="0" inputmode="numeric">
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:14px">
      <input type="checkbox" id="terrainDQ" style="width:20px;height:20px;accent-color:var(--red);cursor:pointer">
      <label for="terrainDQ" style="font-family:var(--font-display);font-weight:700;font-size:.82rem;text-transform:uppercase;letter-spacing:.1em;color:var(--red);cursor:pointer">Disqualifié</label>
    </div>
    <div id="terrainError" class="alert alert-red" style="display:none"></div>
    <button class="btn-primary" onclick="saveChrono()">Enregistrer le passage</button>
  </div>

  <div class="card">
    <div class="card-title">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 3v18h18"/><path d="m19 9-5 5-4-4-3 3"/></svg>
      Classement en cours
    </div>
    <select id="classementCat" class="field-select" onchange="renderClassement()">
      <option value="S">S — Small</option>
      <option value="M">M — Medium</option>
      <option value="I">I — Intermediate</option>
      <option value="L">L — Large</option>
    </select>
    <div id="classementList"><div class="spinner"></div></div>
  </div>

</main>
<div id="toast"></div>
<script src="js/supabase.js"></script>
<script src="js/ui.js"></script>
<script>
let finalists = [];

async function init() {
  try { finalists = await sbGet('finalistes', 'order=cat,chien'); } catch(e) {}
  renderClassement();
  realtimeSubscribe('chronos', () => renderClassement());
}

function loadFinalistsByCat() {
  const cat = document.getElementById('terrainCat').value;
  const list = cat ? finalists.filter(f => f.cat === cat) : [];
  document.getElementById('terrainFinalist').innerHTML =
    '<option value="">— Choisir un binôme —</option>' +
    list.map(f => `<option value="${f.id}">${f.chien} · ${f.conducteur}</option>`).join('');
}

async function saveChrono() {
  const cat       = document.getElementById('terrainCat').value;
  const fid       = document.getElementById('terrainFinalist').value;
  const temps     = parseFloat(document.getElementById('terrainTemps').value);
  const penalites = parseInt(document.getElementById('terrainPenalites').value) || 0;
  const dq        = document.getElementById('terrainDQ').checked;
  const errEl     = document.getElementById('terrainError');
  if (!cat || !fid) { errEl.style.display='block'; errEl.textContent='Choisis la catégorie et le binôme.'; return; }
  if (!dq && (isNaN(temps) || temps <= 0)) { errEl.style.display='block'; errEl.textContent='Saisis un temps valide.'; return; }
  errEl.style.display = 'none';
  try {
    const existing = await sbGet('chronos', `finaliste_id=eq.${fid}&limit=1`);
    if (existing.length) {
      await sbPatch('chronos', `finaliste_id=eq.${fid}`, { temps_sec: dq ? null : temps, penalites, disqualifie: dq, cat });
      showToast('Chrono mis à jour');
    } else {
      await sbPost('chronos', { finaliste_id: parseInt(fid), cat, temps_sec: dq ? null : temps, penalites, disqualifie: dq });
      showToast('Passage enregistré');
    }
    document.getElementById('terrainTemps').value = '';
    document.getElementById('terrainPenalites').value = '0';
    document.getElementById('terrainDQ').checked = false;
    document.getElementById('classementCat').value = cat;
    renderClassement();
  } catch(e) { errEl.style.display='block'; errEl.textContent='Erreur : ' + e.message; }
}

async function renderClassement() {
  const cat = document.getElementById('classementCat').value || 'S';
  const el = document.getElementById('classementList');
  el.innerHTML = '<div class="spinner"></div>';
  try {
    const chronos = await sbGet('chronos', `cat=eq.${cat}&select=*`);
    const dogs = finalists.filter(f => f.cat === cat);
    if (!chronos.length) { el.innerHTML = '<p style="color:var(--muted);font-size:.88rem">Aucun passage enregistré pour cette catégorie.</p>'; return; }
    const rows = chronos.map(c => {
      const f = dogs.find(d => d.id === c.finaliste_id);
      return { ...c, f, score: c.disqualifie ? Infinity : (c.temps_sec||0)+(c.penalites||0) };
    }).sort((a,b) => a.score - b.score);
    el.innerHTML = rows.map((r,i) => `
      <div class="chrono-row">
        <div class="chrono-pos ${r.disqualifie?'chrono-dq':''}">${r.disqualifie?'DQ':i+1}</div>
        <div class="chrono-info">
          <div class="chrono-name ${r.disqualifie?'chrono-dq':''}">${r.f?.chien||'?'} · ${r.f?.conducteur||'?'}</div>
          <div class="chrono-detail">${r.disqualifie?'Disqualifié':`${r.penalites||0} pt(s) de pénalité`}</div>
        </div>
        <div class="chrono-time ${r.disqualifie?'chrono-dq':''}">${r.disqualifie?'—':(r.temps_sec?.toFixed(2)+'s')}</div>
      </div>`).join('');
  } catch(e) { el.innerHTML = '<div class="alert alert-red">Erreur chargement.</div>'; }
}
init();
</script>
</body>
</html>
