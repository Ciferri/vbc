<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Very Breizh Cup — Administration</title>
<link rel="stylesheet" href="js/style.css">
</head>
<body>
<header class="app-header">
  <div class="header-logo">
    <img src="js/logo.png" alt="Club Canin de Bourgbarré">
    <div class="app-title">Very Breizh <span class="cup">Cup</span><span class="sub">Administration</span></div>
  </div>
  <span class="role-badge">Admin</span>
</header>
<main class="page">

  <!-- LOGIN -->
  <div id="adminLoginSection">
    <div class="card">
      <div class="card-title">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>
        Accès Administration
      </div>
      <label class="field-label">Mot de passe</label>
      <input type="password" id="adminPwd" class="field-input" placeholder="••••••••" onkeydown="if(event.key==='Enter')adminLogin()">
      <div id="adminLoginError" class="alert alert-red" style="display:none">Mot de passe incorrect.</div>
      <button class="btn-primary" onclick="adminLogin()">Connexion</button>
    </div>
  </div>

  <!-- PANEL -->
  <div id="adminPanel" style="display:none">

    <div class="card">
      <div class="card-title">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 3h18v18H3zM3 9h18M9 21V9"/></svg>
        Statistiques globales
      </div>
      <div class="stat-row">
        <div class="stat-pill"><span class="num" id="statTotal">—</span>&nbsp;tickets</div>
        <div class="stat-pill"><span class="num" id="statPaid">—</span>&nbsp;payés</div>
        <div class="stat-pill"><span class="num" id="statPending">—</span>&nbsp;en attente</div>
        <div class="stat-pill"><span class="num" id="statRevenu">—</span>&nbsp;€ encaissés</div>
      </div>
    </div>

    <div class="card">
      <div class="card-title">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.07 4.93a10 10 0 010 14.14M4.93 4.93a10 10 0 000 14.14"/></svg>
        Contrôle des paris
      </div>
      <div id="betsOpenMsg" class="alert alert-lime">Paris ouverts — Les joueurs peuvent parier.</div>
      <div id="betsClosedMsg" class="alert alert-red" style="display:none">Paris clôturés.</div>
      <button id="btnToggleBets" class="btn-danger" onclick="toggleBets()">Clôturer les paris</button>
    </div>

    <div class="card">
      <div class="card-title">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>
        Gestion des finalistes
      </div>
      <label class="field-label">Conducteur</label>
      <input type="text" id="newConducteur" class="field-input" placeholder="Ex : Sophie Tanguy" autocomplete="off">
      <label class="field-label">Chien</label>
      <input type="text" id="newChien" class="field-input" placeholder="Ex : Vaina" autocomplete="off">
      <label class="field-label">Catégorie</label>
      <select id="newCat" class="field-select">
        <option value="S">S — Small</option>
        <option value="M">M — Medium</option>
        <option value="I">I — Intermediate</option>
        <option value="L">L — Large</option>
      </select>
      <button class="btn-sm" onclick="addFinalist()">Ajouter le binôme</button>
      <hr class="section-divider">
      <select id="finalistCatFilter" class="field-select" onchange="renderFinalistList()">
        <option value="">Toutes les catégories</option>
        <option value="S">S</option><option value="M">M</option>
        <option value="I">I</option><option value="L">L</option>
      </select>
      <div id="finalistList"></div>
    </div>

    <div class="card">
      <div class="card-title">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M8 21h8M12 21V3M3 7l9-4 9 4v6a9 9 0 01-18 0V7z"/></svg>
        Podium officiel et gagnants
      </div>
      <label class="field-label">Catégorie</label>
      <select id="officialCat" class="field-select" onchange="onOfficialCatChange()">
        <option value="">— Sélectionner —</option>
        <option value="S">S — Small</option><option value="M">M — Medium</option>
        <option value="I">I — Intermediate</option><option value="L">L — Large</option>
      </select>
      <div id="officialFields" style="display:none">
        <label class="field-label">1re place</label>
        <select id="official1" class="field-select"><option value="">—</option></select>
        <label class="field-label">2e place</label>
        <select id="official2" class="field-select"><option value="">—</option></select>
        <label class="field-label">3e place</label>
        <select id="official3" class="field-select"><option value="">—</option></select>
        <button class="btn-primary" onclick="calculateWinners()" style="margin-top:4px">Calculer les gagnants</button>
      </div>
      <div id="resultsContent" style="margin-top:12px"></div>
    </div>

    <div class="card">
      <div class="card-title">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
        Tous les tickets
      </div>
      <select id="ticketsFilterCat" class="field-select" onchange="renderAllTickets()">
        <option value="">Toutes les catégories</option>
        <option value="S">S</option><option value="M">M</option>
        <option value="I">I</option><option value="L">L</option>
      </select>
      <div id="allTicketsList" style="max-height:320px;overflow-y:auto"></div>
    </div>

  </div>
</main>
<div id="toast"></div>
<script src="js/supabase.js"></script>
<script>
const ADMIN_PWD = 'breizh2025';
let finalists = [], betsClosed = false;

function adminLogin() {
  if (document.getElementById('adminPwd').value === ADMIN_PWD) {
    document.getElementById('adminLoginSection').style.display = 'none';
    document.getElementById('adminPanel').style.display = 'block';
    loadAll();
  } else {
    document.getElementById('adminLoginError').style.display = 'block';
  }
}

async function loadAll() {
  try { finalists = await sbGet('finalistes', 'order=cat,chien'); } catch(e) {}
  loadConfig(); refreshStats(); renderFinalistList(); renderAllTickets();
  realtimeSubscribe('tickets', () => { refreshStats(); renderAllTickets(); });
}

async function loadConfig() {
  try {
    const rows = await sbGet('config', 'select=key,value');
    const cfg = Object.fromEntries(rows.map(r => [r.key, r.value]));
    betsClosed = cfg.bets_closed === 'true';
    updateBetsUI();
  } catch(e) {}
}

async function toggleBets() {
  betsClosed = !betsClosed;
  try {
    await sbPatch('config', 'key=eq.bets_closed', { value: betsClosed ? 'true' : 'false' });
    updateBetsUI();
    showToast(betsClosed ? 'Paris clôturés' : 'Paris ouverts');
  } catch(e) { showToast('Erreur','err'); betsClosed = !betsClosed; }
}

function updateBetsUI() {
  document.getElementById('betsOpenMsg').style.display = betsClosed ? 'none' : 'block';
  document.getElementById('betsClosedMsg').style.display = betsClosed ? 'block' : 'none';
  const btn = document.getElementById('btnToggleBets');
  btn.textContent = betsClosed ? 'Rouvrir les paris' : 'Clôturer les paris';
  btn.className = betsClosed ? 'btn-primary' : 'btn-danger';
}

async function refreshStats() {
  try {
    const all = await sbGet('tickets', 'select=status');
    const paid = all.filter(t => t.status==='paid').length;
    document.getElementById('statTotal').textContent = all.length;
    document.getElementById('statPaid').textContent = paid;
    document.getElementById('statPending').textContent = all.length - paid;
    document.getElementById('statRevenu').textContent = (paid * 2).toLocaleString('fr-FR');
  } catch(e) {}
}

async function addFinalist() {
  const c = document.getElementById('newConducteur').value.trim();
  const d = document.getElementById('newChien').value.trim();
  const cat = document.getElementById('newCat').value;
  if (!c || !d) { showToast('Remplis conducteur et chien','err'); return; }
  try {
    const [f] = await sbPost('finalistes', { conducteur: c, chien: d, cat });
    finalists.push(f); finalists.sort((a,b)=>a.cat.localeCompare(b.cat)||a.chien.localeCompare(b.chien));
    document.getElementById('newConducteur').value = '';
    document.getElementById('newChien').value = '';
    renderFinalistList();
    showToast(`${d} ajouté`);
  } catch(e) { showToast('Erreur ajout','err'); }
}

async function removeFinalist(id) {
  if (!confirm('Supprimer ce finaliste ?')) return;
  try {
    await sbDelete('finalistes', `id=eq.${id}`);
    finalists = finalists.filter(f => f.id !== id);
    renderFinalistList();
    showToast('Finaliste supprimé');
  } catch(e) { showToast('Erreur suppression','err'); }
}

function renderFinalistList() {
  const cat = document.getElementById('finalistCatFilter').value;
  const list = cat ? finalists.filter(f => f.cat === cat) : finalists;
  const el = document.getElementById('finalistList');
  if (!list.length) { el.innerHTML = '<p style="color:var(--muted);font-size:.88rem">Aucun finaliste.</p>'; return; }
  el.innerHTML = list.map((f,i) => `
    <div class="finalist-item">
      <span class="finalist-num">#${String(i+1).padStart(2,'0')}</span>
      <div class="finalist-info">
        <div class="finalist-name">${f.chien} <span style="font-size:.72rem;color:var(--lime-dark);font-family:var(--font-display);font-weight:700">(${f.cat})</span></div>
        <div class="finalist-dog">${f.conducteur}</div>
      </div>
      <button class="btn-sm-danger" onclick="removeFinalist(${f.id})">Retirer</button>
    </div>`).join('');
}

function onOfficialCatChange() {
  const cat = document.getElementById('officialCat').value;
  document.getElementById('officialFields').style.display = cat ? 'block' : 'none';
  document.getElementById('resultsContent').innerHTML = '';
  if (!cat) return;
  const list = finalists.filter(f => f.cat === cat);
  const opts = '<option value="">—</option>' + list.map(f => `<option value="${f.id}">${f.chien} · ${f.conducteur}</option>`).join('');
  ['official1','official2','official3'].forEach(id => { document.getElementById(id).innerHTML = opts; });
}

async function calculateWinners() {
  const cat = document.getElementById('officialCat').value;
  const o1 = parseInt(document.getElementById('official1').value);
  const o2 = parseInt(document.getElementById('official2').value);
  const o3 = parseInt(document.getElementById('official3').value);
  const el = document.getElementById('resultsContent');
  if (!o1||!o2||!o3) { el.innerHTML = '<div class="alert alert-red">Sélectionne les 3 positions.</div>'; return; }
  if (o1===o2||o1===o3||o2===o3) { el.innerHTML = '<div class="alert alert-red">Un même binôme en double.</div>'; return; }
  el.innerHTML = '<div class="spinner"></div>';
  try {
    const paid = await sbGet('tickets', `status=eq.paid&cat=eq.${cat}&select=*`);
    const f1=finalists.find(f=>f.id===o1), f2=finalists.find(f=>f.id===o2), f3=finalists.find(f=>f.id===o3);
    let html = `<div style="background:var(--light);border-radius:var(--radius);padding:14px;margin-bottom:14px;border:1.5px solid var(--border)">
      <div class="section-label" style="margin-bottom:8px">Podium officiel</div>
      <div class="podium-line" style="color:var(--text)"><span class="medal-icon m1">1</span><span>${f1?.chien} · ${f1?.conducteur}</span></div>
      <div class="podium-line" style="color:var(--text)"><span class="medal-icon m2">2</span><span>${f2?.chien} · ${f2?.conducteur}</span></div>
      <div class="podium-line" style="color:var(--text)"><span class="medal-icon m3">3</span><span>${f3?.chien} · ${f3?.conducteur}</span></div>
    </div>`;
    if (!paid.length) { el.innerHTML = html + '<div class="alert alert-yellow">Aucun ticket payé pour cette catégorie.</div>'; return; }
    const exact = paid.filter(t => t.pick1===o1&&t.pick2===o2&&t.pick3===o3);
    if (exact.length) {
      html += `<div class="section-label" style="color:var(--lime-dark);margin-bottom:8px">Top 3 exact — ${exact.length} gagnant(s)</div>`;
      html += exact.map(t => `<div style="background:var(--lime-light);border:1.5px solid var(--lime);border-radius:var(--radius);padding:14px;margin-bottom:8px">
        <div style="font-family:var(--font-display);font-weight:900;font-size:1.2rem;color:var(--lime-dark)">${t.prenom} ${t.nom.toUpperCase()}</div>
        <div style="font-family:var(--font-mono);font-size:.78rem;color:var(--muted);margin-top:3px">${t.id} · ${t.tel}</div>
      </div>`).join('');
    } else {
      const top2 = paid.filter(t => t.pick1===o1&&t.pick2===o2);
      html += '<div class="alert alert-yellow" style="margin-bottom:10px">Aucun Top 3 exact. Meilleur résultat : Top 2 exact.</div>';
      if (top2.length) {
        html += `<div class="section-label" style="color:#92400e;margin-bottom:8px">Top 2 exact — ${top2.length} proche(s)</div>`;
        html += top2.map(t => `<div style="background:rgba(217,119,6,.07);border:1.5px solid rgba(217,119,6,.3);border-radius:var(--radius);padding:14px;margin-bottom:8px">
          <div style="font-family:var(--font-display);font-weight:900;font-size:1.1rem;color:#92400e">${t.prenom} ${t.nom.toUpperCase()}</div>
          <div style="font-family:var(--font-mono);font-size:.78rem;color:var(--muted);margin-top:3px">${t.id} · ${t.tel}</div>
        </div>`).join('');
      } else { html += '<div class="alert alert-red">Personne n\'a le Top 2 exact non plus.</div>'; }
    }
    el.innerHTML = html;
    el.scrollIntoView({behavior:'smooth',block:'start'});
  } catch(e) { el.innerHTML = '<div class="alert alert-red">Erreur calcul.</div>'; }
}

async function renderAllTickets() {
  const el = document.getElementById('allTicketsList');
  if (!el) return;
  const cat = document.getElementById('ticketsFilterCat').value;
  let params = 'order=created_at.desc&select=id,prenom,nom,cat,status&limit=200';
  if (cat) params += `&cat=eq.${cat}`;
  try {
    const list = await sbGet('tickets', params);
    if (!list.length) { el.innerHTML = '<p style="color:var(--muted);font-size:.88rem">Aucun ticket.</p>'; return; }
    el.innerHTML = list.map(t => {
      const paid = t.status==='paid';
      return `<div style="display:flex;align-items:center;gap:8px;padding:9px 0;border-bottom:1px solid var(--border)">
        <span style="font-family:var(--font-mono);font-size:.72rem;color:var(--lime-dark);min-width:88px">${t.id}</span>
        <span style="font-family:var(--font-display);font-weight:700;font-size:.72rem;color:var(--muted);min-width:16px">${t.cat||'—'}</span>
        <span style="flex:1;font-size:.88rem">${t.prenom} ${t.nom}</span>
        <span class="badge ${paid?'badge-paid':'badge-pending'}">${paid?'Payé':'Attente'}</span>
      </div>`;
    }).join('');
  } catch(e) { el.innerHTML = '<div class="alert alert-red">Erreur chargement.</div>'; }
}
</script>
</body>
</html>
